name: Deploy to Cloudflare Pages

# Auto-deploy the Astro site to Cloudflare Pages on every push to main
# (the project is a direct-upload Pages project, so this Action replaces
# the old Netlify auto-deploy). Requires two repo secrets:
#   CLOUDFLARE_API_TOKEN  – Cloudflare token with "Cloudflare Pages: Edit"
#   CLOUDFLARE_ACCOUNT_ID – the Torjai Cloudflare account id

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=torjai-productions --branch=main
